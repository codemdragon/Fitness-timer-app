<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether Timer | Pro Wheel</title>
    <meta name="theme-color" content="#00f3ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-cyan: #00f3ff;
            --dark-bg: #0a0b1e;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .neon-text-cyan {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
        }

        .neon-bg-cyan {
            background-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Futuristic Scroll Picker */
        .picker-container {
            height: 150px;
            overflow-y: scroll;
            scrollbar-width: none;
            scroll-snap-type: y mandatory;
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }

        .picker-container::-webkit-scrollbar {
            display: none;
        }

        .picker-item {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.2s;
            opacity: 0.3;
            scroll-snap-align: center;
            font-family: 'Orbitron', sans-serif;
        }

        .picker-item.active {
            opacity: 1;
            color: var(--neon-cyan);
            transform: scale(1.2);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        .timer-active {
            animation: pulse 2s infinite ease-in-out;
        }

        .page {
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        .page-hidden {
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
        }

        @media (orientation: landscape) {
            .timer-layout {
                flex-direction: row !important;
                justify-content: center !important;
                align-items: center !important;
                height: 100% !important;
                padding-top: 0 !important;
                gap: 2rem !important;
            }

            .timer-ring-container {
                width: 45vh !important;
                height: 45vh !important;
                max-width: 250px;
                max-height: 250px;
            }

            .landscape-controls {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                grid-template-rows: auto auto !important;
            }
        }

        /* Big Timer Mode */
        body.big-timer-mode header,
        body.big-timer-mode .landscape-controls,
        body.big-timer-mode .text-center {
            display: none !important;
        }

        body.big-timer-mode .page-timer {
            justify-content: center;
            padding: 0 !important;
        }

        body.big-timer-mode .timer-layout {
            gap: 0 !important;
        }

        /* Hide ring in big mode */
        body.big-timer-mode .timer-ring-container svg {
            display: none !important;
        }

        body.big-timer-mode .timer-ring-container {
            width: 100vw !important;
            height: 100vh !important;
            max-width: none !important;
            max-height: none !important;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            /* Above everything */
        }

        body.big-timer-mode #timer-display {
            font-size: 55vmin !important;
            /* ULTRA MASSIVE TEXT */
            text-shadow: 0 0 40px var(--neon-cyan);
        }

        /* Progress Bar for Big Mode */
        #big-timer-progress-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            height: 15px;
            background-color: var(--neon-cyan);
            width: 100%;
            z-index: 60;
            transition: width 0.1s linear;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        body.big-timer-mode #big-timer-progress-bar {
            display: block;
        }

        /* Big Timer Label */
        #big-timer-label {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 61;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.7);
        }

        body.big-timer-mode #big-timer-label {
            display: block;
        }

        /* Color Picker Styles */
        .color-swatch {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.selected {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: var(--neon-cyan);
        }

        .toggle-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(28px);
        }

        /* Timer Flash Animation */
        @keyframes timerFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        body.timer-flash {
            animation: timerFlash 1s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header class="fixed top-0 left-0 right-0 z-40 bg-gradient-to-b from-black/60 to-transparent backdrop-blur-md p-4">
        <div class="flex items-center justify-between max-w-md mx-auto">
            <button onclick="app.navigateTo('home')" class="text-2xl font-orbitron neon-text-cyan">
                <i class="fa-solid fa-stopwatch"></i> AETHER
            </button>
            <button onclick="app.navigateTo('settings')" class="text-2xl neon-text-cyan">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <!-- HOME PAGE -->
    <div id="page-home" class="page pt-20 px-4">
        <div class="max-w-md mx-auto">
            <button onclick="app.createCircuit()" class="w-full glass-panel p-6 mb-6 flex items-center justify-center gap-3 neon-text-cyan font-orbitron text-xl">
                <i class="fa-solid fa-circle-plus text-3xl"></i> NEW CIRCUIT
            </button>
            <div id="circuit-list"></div>
        </div>
    </div>

    <!-- EDITOR PAGE -->
    <div id="page-editor" class="page page-hidden pt-20 px-4">
        <div class="max-w-md mx-auto">
            <div class="glass-panel p-6 mb-6">
                <label class="block text-sm opacity-70 mb-2">Circuit Name</label>
                <input type="text" id="circuit-name-input" class="w-full bg-transparent border-b-2 border-cyan-400 text-xl font-orbitron text-cyan-400 outline-none pb-2" placeholder="My Circuit">
            </div>

            <div class="flex gap-3 mb-6">
                <button onclick="app.openTaskModal('workout')" class="flex-1 glass-panel p-4 flex items-center justify-center gap-2 text-green-400 font-orbitron">
                    <i class="fa-solid fa-dumbbell"></i> EXERCISE
                </button>
                <button onclick="app.openTaskModal('break')" class="flex-1 glass-panel p-4 flex items-center justify-center gap-2 text-orange-400 font-orbitron">
                    <i class="fa-solid fa-mug-hot"></i> BREAK
                </button>
            </div>

            <div id="task-list"></div>

            <button onclick="app.saveCircuit()" class="w-full neon-bg-cyan text-black font-orbitron font-bold p-5 rounded-3xl mt-6 text-xl">
                SAVE CIRCUIT
            </button>
        </div>
    </div>

    <!-- TIMER PAGE -->
    <div id="page-timer" class="page page-hidden pt-20 flex flex-col">
        <div class="timer-layout flex-1 flex flex-col items-center justify-start pt-8 gap-8">
            <div class="timer-ring-container relative w-80 h-80 max-w-[80vw] max-h-[80vw]">
                <svg class="w-full h-full -rotate-90" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"></circle>
                    <circle id="timer-ring" cx="100" cy="100" r="90" fill="none" stroke="var(--timer-color)" stroke-width="8" stroke-dasharray="565.48" stroke-dashoffset="0" stroke-linecap="round"></circle>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <div id="timer-display" class="text-7xl font-orbitron font-bold neon-text-cyan">00:00</div>
                    <div id="task-name" class="text-xl opacity-70 mt-2">Ready</div>
                </div>
            </div>

            <div class="landscape-controls w-full max-w-md px-4 flex gap-3">
                <button id="prev-btn" onclick="app.prevTask()" class="flex-1 glass-panel p-4 rounded-2xl text-2xl opacity-50">
                    <i class="fa-solid fa-backward-step"></i>
                </button>
                <button id="play-btn" onclick="app.toggleTimer()" class="flex-1 glass-panel p-4 rounded-2xl text-4xl neon-text-cyan">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button id="skip-btn" onclick="app.skipTask()" class="flex-1 glass-panel p-4 rounded-2xl text-2xl opacity-50">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
                <button id="loop-btn" onclick="app.toggleLoop()" class="flex-1 glass-panel p-4 rounded-2xl text-2xl opacity-50">
                    <i class="fa-solid fa-repeat"></i>
                </button>
                <button onclick="app.toggleBigMode()" class="flex-1 glass-panel p-4 rounded-2xl text-2xl opacity-70">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <button onclick="app.stopTimer()" class="flex-1 glass-panel p-4 rounded-2xl text-2xl text-red-400">
                    <i class="fa-solid fa-stop"></i>
                </button>
            </div>

            <div class="text-center opacity-70 text-sm">
                <span id="task-counter">0 / 0</span>
            </div>
        </div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="page-settings" class="page page-hidden pt-20 px-4">
        <div class="max-w-md mx-auto">
            <h2 class="text-3xl font-orbitron neon-text-cyan mb-6">SETTINGS</h2>

            <!-- Timer Flash Section -->
            <div class="glass-panel p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h3 class="text-xl font-orbitron">Timer Flash</h3>
                        <p class="text-sm opacity-70">Screen pulses during timer</p>
                    </div>
                    <div class="toggle-switch" id="flash-toggle" onclick="app.toggleFlash()">
                        <div class="toggle-slider"></div>
                    </div>
                </div>

                <div id="flash-settings" class="mt-6 space-y-6" style="display: none;">
                    <!-- Exercise Color -->
                    <div>
                        <label class="block text-sm opacity-70 mb-3">Exercise Color</label>
                        <div class="grid grid-cols-5 gap-3">
                            <div class="color-swatch selected" style="background-color: #00f3ff;" data-color="#00f3ff" data-type="exercise" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ff00ff;" data-color="#ff00ff" data-type="exercise" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #00ff00;" data-color="#00ff00" data-type="exercise" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ffff00;" data-color="#ffff00" data-type="exercise" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ff6600;" data-color="#ff6600" data-type="exercise" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ff0000;" data-color="#ff0000" data-type="exercise" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #0066ff;" data-color="#0066ff" data-type="exercise" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #9933ff;" data-color="#9933ff" data-type="exercise" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ffffff;" data-color="#ffffff" data-type="exercise" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ff1493;" data-color="#ff1493" data-type="exercise" onclick="app.selectColor(this)"></div>
                        </div>
                    </div>

                    <!-- Break Color -->
                    <div>
                        <label class="block text-sm opacity-70 mb-3">Break Color</label>
                        <div class="grid grid-cols-5 gap-3">
                            <div class="color-swatch" style="background-color: #00f3ff;" data-color="#00f3ff" data-type="break" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ff00ff;" data-color="#ff00ff" data-type="break" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #00ff00;" data-color="#00ff00" data-type="break" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ffff00;" data-color="#ffff00" data-type="break" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch selected" style="background-color: #ff6600;" data-color="#ff6600" data-type="break" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ff0000;" data-color="#ff0000" data-type="break" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #0066ff;" data-color="#0066ff" data-type="break" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #9933ff;" data-color="#9933ff" data-type="break" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ffffff;" data-color="#ffffff" data-type="break" onclick="app.selectColor(this)"></div>
                            <div class="color-swatch" style="background-color: #ff1493;" data-color="#ff1493" data-type="break" onclick="app.selectColor(this)"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Countdown Beep Section -->
            <div class="glass-panel p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h3 class="text-xl font-orbitron">Countdown Beep</h3>
                        <p class="text-sm opacity-70">Beep on last seconds</p>
                    </div>
                    <div class="toggle-switch" id="beep-toggle" onclick="app.toggleBeep()">
                        <div class="toggle-slider"></div>
                    </div>
                </div>

                <div id="beep-settings" class="mt-6" style="display: none;">
                    <label class="block text-sm opacity-70 mb-3">Beep on last</label>
                    <div class="picker-container glass-panel" id="beep-picker">
                        <div style="height: 50px;"></div>
                        <div class="picker-item" data-value="0">OFF</div>
                        <div class="picker-item" data-value="3">3 sec</div>
                        <div class="picker-item active" data-value="5">5 sec</div>
                        <div class="picker-item" data-value="10">10 sec</div>
                        <div style="height: 50px;"></div>
                    </div>
                </div>
            </div>

            <!-- Reset Settings -->
            <button onclick="app.resetSettings()" class="w-full glass-panel p-4 text-red-400 font-orbitron">
                <i class="fa-solid fa-rotate-left mr-2"></i> RESET TO DEFAULTS
            </button>
        </div>
    </div>

    <!-- Big Timer Progress Bar & Label -->
    <div id="big-timer-progress-bar"></div>
    <div id="big-timer-label">Exercise</div>

    <!-- MODAL: ADD TASK -->
    <div id="modal-add-task" class="fixed inset-0 bg-black/80 flex items-end justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="w-full max-w-md bg-gradient-to-b from-gray-900 to-black rounded-t-3xl p-6 transform translate-y-full transition-transform duration-300">
            <h3 class="text-2xl font-orbitron neon-text-cyan mb-4">Add Task</h3>
            <input type="text" id="modal-task-name" class="w-full bg-transparent border-b-2 border-cyan-400 text-xl font-orbitron text-cyan-400 outline-none pb-2 mb-6" placeholder="Task Name">

            <div class="flex gap-6 mb-6">
                <div class="flex-1">
                    <label class="block text-sm opacity-70 mb-2">Minutes</label>
                    <div class="picker-container glass-panel" id="picker-minutes"></div>
                </div>
                <div class="flex-1">
                    <label class="block text-sm opacity-70 mb-2">Seconds</label>
                    <div class="picker-container glass-panel" id="picker-seconds"></div>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="app.closeTaskModal()" class="flex-1 glass-panel p-4 rounded-2xl font-orbitron">CANCEL</button>
                <button onclick="app.confirmTask()" class="flex-1 neon-bg-cyan text-black font-orbitron font-bold p-4 rounded-2xl">ADD</button>
            </div>
        </div>
    </div>

    <!-- MODAL: QR CODE -->
    <div id="qr-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300 p-6">
        <div class="glass-panel p-8 max-w-md w-full text-center">
            <h3 id="qr-title" class="text-2xl font-orbitron neon-text-cyan mb-6"></h3>
            <div id="qr-code" class="bg-white p-4 rounded-2xl inline-block mb-6"></div>
            <div class="flex gap-3">
                <button onclick="app.shareLinkOnly()" class="flex-1 glass-panel p-4 rounded-2xl font-orbitron">
                    <i class="fa-solid fa-share-nodes mr-2"></i> SHARE
                </button>
                <button onclick="app.closeQRModal()" class="flex-1 neon-bg-cyan text-black font-orbitron font-bold p-4 rounded-2xl">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- MODAL: QR SCANNER -->
    <div id="scanner-modal" class="fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300 p-6">
        <h3 class="text-2xl font-orbitron neon-text-cyan mb-6">SCAN QR CODE</h3>
        <div id="reader" class="w-full max-w-md mb-6"></div>
        <button onclick="app.closeScanner()" class="neon-bg-cyan text-black font-orbitron font-bold px-8 py-4 rounded-2xl">CANCEL</button>
    </div>

    <script>
        const app = (() => {
            // --- SETTINGS STATE ---
            let settings = {
                flashEnabled: false,
                exerciseColor: '#00f3ff',
                breakColor: '#ff6600',
                beepEnabled: false,
                beepSeconds: 5
            };

            // Load settings from localStorage
            const loadSettings = () => {
                const saved = localStorage.getItem('aether-settings');
                if (saved) {
                    settings = { ...settings, ...JSON.parse(saved) };
                }
                applySettings();
            };

            const saveSettings = () => {
                localStorage.setItem('aether-settings', JSON.stringify(settings));
            };

            const applySettings = () => {
                // Update UI toggles
                const flashToggle = document.getElementById('flash-toggle');
                const beepToggle = document.getElementById('beep-toggle');
                const flashSettings = document.getElementById('flash-settings');
                const beepSettings = document.getElementById('beep-settings');

                if (settings.flashEnabled) {
                    flashToggle.classList.add('active');
                    flashSettings.style.display = 'block';
                } else {
                    flashToggle.classList.remove('active');
                    flashSettings.style.display = 'none';
                }

                if (settings.beepEnabled) {
                    beepToggle.classList.add('active');
                    beepSettings.style.display = 'block';
                } else {
                    beepToggle.classList.remove('active');
                    beepSettings.style.display = 'none';
                }

                // Update selected colors
                document.querySelectorAll('.color-swatch').forEach(swatch => {
                    const color = swatch.dataset.color;
                    const type = swatch.dataset.type;
                    if (type === 'exercise' && color === settings.exerciseColor) {
                        swatch.classList.add('selected');
                    } else if (type === 'break' && color === settings.breakColor) {
                        swatch.classList.add('selected');
                    } else if (swatch.dataset.type === type) {
                        swatch.classList.remove('selected');
                    }
                });
            };

            // Audio context for beeps
            let audioContext = null;
            const playBeep = (frequency = 800, duration = 100) => {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration / 1000);
            };

            // --- CORE STATE ---
            let db, circuits = [], activeCircuit = null, activeTaskIndex = 0, timeLeftWhenPaused = 0, endTime = 0, isTimerRunning = false, isLooping = false, isBigMode = false, html5QrCode = null, lastShareUrl = '', lastBeepTime = -1;

            // --- DOM REFS ---
            const els = {
                pages: ['home', 'editor', 'timer', 'settings'].reduce((o, p) => ({ ...o, [p]: document.getElementById('page-' + p) }), {}),
                circuitList: document.getElementById('circuit-list'),
                taskList: document.getElementById('task-list'),
                circuitNameInput: document.getElementById('circuit-name-input'),
                modal: document.getElementById('modal-add-task'),
                modalName: document.getElementById('modal-task-name'),
                pickerM: document.getElementById('picker-minutes'),
                pickerS: document.getElementById('picker-seconds'),
                timerDisplay: document.getElementById('timer-display'),
                taskName: document.getElementById('task-name'),
                taskCounter: document.getElementById('task-counter'),
                timerRing: document.getElementById('timer-ring'),
                playBtn: document.getElementById('play-btn'),
                loopBtn: document.getElementById('loop-btn'),
                prevBtn: document.getElementById('prev-btn'),
                skipBtn: document.getElementById('skip-btn'),
                qrModal: document.getElementById('qr-modal'),
                qrCode: document.getElementById('qr-code'),
                qrTitle: document.getElementById('qr-title'),
                scannerModal: document.getElementById('scanner-modal'),
                bigTimerProgressBar: document.getElementById('big-timer-progress-bar'),
                bigTimerLabel: document.getElementById('big-timer-label')
            };

            // --- NAVIGATION ---
            const navigateTo = (page) => {
                Object.keys(els.pages).forEach(p => els.pages[p].classList.toggle('page-hidden', p !== page));
                
                // Update bottom nav
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.page === page);
                });

                if (page === 'home') renderHome();
                if (page === 'settings') {
                    applySettings();
                    setTimeout(setupBeepPicker, 50); // Ensure picker is set up when settings open
                }
            };

            // --- INDEXEDDB SETUP ---
            const initDB = () => {
                const req = indexedDB.open('AetherDB', 1);
                req.onupgradeneeded = (e) => e.target.result.createObjectStore('circuits', { keyPath: 'id' });
                req.onsuccess = (e) => { db = e.target.result; loadAllCircuits(); };
                req.onerror = () => showDialog({ title: 'Error', message: 'Database error!', type: 'warning', icon: 'exclamation-triangle' });
            };

            const loadAllCircuits = () => {
                const tx = db.transaction('circuits', 'readonly');
                const store = tx.objectStore('circuits');
                const req = store.getAll();
                req.onsuccess = () => { circuits = req.result; renderHome(); };
            };

            const saveToDB = (circuit) => {
                const tx = db.transaction('circuits', 'readwrite');
                tx.objectStore('circuits').put(circuit);
                tx.oncomplete = () => loadAllCircuits();
            };

            const deleteFromDB = (id) => {
                const tx = db.transaction('circuits', 'readwrite');
                tx.objectStore('circuits').delete(id);
                tx.oncomplete = () => loadAllCircuits();
            };

            // --- RENDERING ---
            const renderHome = () => {
                if (circuits.length === 0) {
                    els.circuitList.innerHTML = '<div class="glass-panel p-8 text-center opacity-50">No circuits yet. Create one!</div>';
                } else {
                    els.circuitList.innerHTML = circuits.map(c => {
                        const total = c.tasks.reduce((sum, t) => sum + t.duration, 0);
                        const m = Math.floor(total / 60);
                        const s = total % 60;
                        return `
                            <div class="glass-panel p-6 mb-4">
                                <div class="flex items-start justify-between mb-3">
                                    <div class="flex-1">
                                        <h3 class="text-xl font-orbitron neon-text-cyan">${c.name}</h3>
                                        <p class="text-sm opacity-70">${c.tasks.length} tasks • ${m}m ${s}s</p>
                                    </div>
                                    <button onclick="app.shareCircuit('${c.id}')" class="text-2xl ml-3">
                                        <i class="fa-solid fa-share-nodes"></i>
                                    </button>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="app.runCircuit('${c.id}')" class="flex-1 bg-green-600/30 text-green-400 p-3 rounded-xl font-orbitron">
                                        <i class="fa-solid fa-play mr-2"></i> START
                                    </button>
                                    <button onclick="app.editCircuit('${c.id}')" class="flex-1 bg-blue-600/30 text-blue-400 p-3 rounded-xl font-orbitron">
                                        <i class="fa-solid fa-pen mr-2"></i> EDIT
                                    </button>
                                    <button onclick="app.deleteCircuit('${c.id}')" class="flex-1 bg-red-600/30 text-red-400 p-3 rounded-xl font-orbitron">
                                        <i class="fa-solid fa-trash mr-2"></i> DEL
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                // Add QR scan button at bottom
                els.circuitList.innerHTML += `
                    <button onclick="app.openScanner()" class="w-full glass-panel p-6 mt-4 flex items-center justify-center gap-3 text-purple-400 font-orbitron text-xl">
                        <i class="fa-solid fa-qrcode text-3xl"></i> SCAN QR CODE
                    </button>
                `;
            };

            const renderEditor = () => {
                els.circuitNameInput.value = activeCircuit.name;
                els.taskList.innerHTML = activeCircuit.tasks.map((t, i) => {
                    const m = Math.floor(t.duration / 60);
                    const s = t.duration % 60;
                    const color = t.type === 'workout' ? 'text-green-400' : 'text-orange-400';
                    const icon = t.type === 'workout' ? 'fa-dumbbell' : 'fa-mug-hot';
                    return `
                        <div class="glass-panel p-4 mb-3 flex items-center justify-between">
                            <div class="flex items-center gap-3 flex-1">
                                <i class="fa-solid ${icon} ${color} text-xl"></i>
                                <div>
                                    <div class="font-orbitron">${t.name}</div>
                                    <div class="text-sm opacity-70">${m}m ${s}s</div>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                ${i > 0 ? `<button onclick="app.moveTask(${i}, -1)" class="px-3 py-2"><i class="fa-solid fa-chevron-up"></i></button>` : ''}
                                ${i < activeCircuit.tasks.length - 1 ? `<button onclick="app.moveTask(${i}, 1)" class="px-3 py-2"><i class="fa-solid fa-chevron-down"></i></button>` : ''}
                                <button onclick="app.removeTask(${i})" class="px-3 py-2 text-red-400"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                }).join('') || '<div class="glass-panel p-8 text-center opacity-50">Add some tasks!</div>';
            };

            // --- TIMER PICKER ---
            const setupPicker = (el, max) => {
                for (let i = 0; i < max; i++) {
                    const div = document.createElement('div');
                    div.className = 'picker-item';
                    div.dataset.value = i;
                    div.textContent = i.toString().padStart(2, '0');
                    el.appendChild(div);
                }

                // Scroll handler
                const updateActive = () => {
                    const scrollTop = el.scrollTop;
                    const items = [...el.children];
                    items.forEach((item, idx) => {
                        const offset = Math.abs(scrollTop - idx * 50);
                        item.classList.toggle('active', offset < 25);
                    });
                };

                el.addEventListener('scroll', updateActive);
                updateActive();
            };

            const setPickerValue = (el, val) => {
                el.scrollTop = val * 50;
            };

            const getPickerValue = (el) => Math.round(el.scrollTop / 50);

            // --- TIMER LOGIC ---
            const runCircuit = (id) => {
                activeCircuit = circuits.find(c => c.id === id);
                if (!activeCircuit || activeCircuit.tasks.length === 0) return alert('No tasks!');
                activeTaskIndex = 0;
                setupTimer();
                navigateTo('timer');
            };

            const setupTimer = () => {
                isTimerRunning = false;
                timeLeftWhenPaused = 0;
                loadTask(activeTaskIndex);
                updateControls();
            };

            const loadTask = (index) => {
                if (!activeCircuit || index >= activeCircuit.tasks.length) {
                    if (isLooping && index >= activeCircuit.tasks.length) {
                        activeTaskIndex = 0;
                        loadTask(0);
                    } else {
                        completeCircuit();
                    }
                    return;
                }

                const task = activeCircuit.tasks[index];
                timeLeftWhenPaused = task.duration;
                els.timerDisplay.textContent = formatTime(timeLeftWhenPaused);
                els.taskName.textContent = task.name;
                els.taskCounter.textContent = `${index + 1} / ${activeCircuit.tasks.length}`;
                els.bigTimerLabel.textContent = task.type === 'workout' ? 'Exercise' : 'Break';
                updateRing(1);
                lastBeepTime = -1; // Reset beep tracker

                // Apply flash color if enabled
                if (settings.flashEnabled) {
                    const color = task.type === 'workout' ? settings.exerciseColor : settings.breakColor;
                    document.body.style.backgroundColor = color;
                }
            };

            const startTimer = () => {
                if (!activeCircuit) return;
                isTimerRunning = true;
                endTime = Date.now() + (timeLeftWhenPaused * 1000);
                els.playBtn.querySelector('i').className = 'fa-solid fa-pause';
                els.timerDisplay.classList.add('timer-active');
                if (settings.flashEnabled) {
                    document.body.classList.add('timer-flash');
                }
                requestAnimationFrame(updateTimer);
            };

            const pauseTimer = () => {
                isTimerRunning = false;
                els.playBtn.querySelector('i').className = 'fa-solid fa-play';
                els.timerDisplay.classList.remove('timer-active');
                document.body.classList.remove('timer-flash');
            };

            const updateTimer = () => {
                if (!isTimerRunning) return;

                const now = Date.now();
                timeLeftWhenPaused = Math.max(0, (endTime - now) / 1000);
                els.timerDisplay.textContent = formatTime(timeLeftWhenPaused);

                const task = activeCircuit.tasks[activeTaskIndex];
                const progress = timeLeftWhenPaused / task.duration;
                updateRing(progress);

                // Update big mode progress bar
                if (isBigMode) {
                    els.bigTimerProgressBar.style.width = (progress * 100) + '%';
                }

                // Countdown beep
                if (settings.beepEnabled && settings.beepSeconds > 0) {
                    const secondsLeft = Math.ceil(timeLeftWhenPaused);
                    if (secondsLeft <= settings.beepSeconds && secondsLeft !== lastBeepTime && secondsLeft > 0) {
                        playBeep(secondsLeft === 1 ? 1200 : 800, 150);
                        lastBeepTime = secondsLeft;
                    }
                }

                if (timeLeftWhenPaused <= 0) {
                    activeTaskIndex++;
                    loadTask(activeTaskIndex);
                    if (activeTaskIndex < activeCircuit.tasks.length || isLooping) {
                        endTime = Date.now() + (timeLeftWhenPaused * 1000);
                    } else {
                        pauseTimer();
                        return;
                    }
                }

                requestAnimationFrame(updateTimer);
            };

            const updateRing = (progress) => {
                const circumference = 565.48; // 2 * π * 90
                const offset = circumference * (1 - progress);
                els.timerRing.style.strokeDashoffset = offset;
            };

            const updateControls = () => {
                els.loopBtn.style.opacity = isLooping ? '1' : '0.5';
                els.prevBtn.style.opacity = activeTaskIndex > 0 ? '1' : '0.5';
                els.skipBtn.style.opacity = activeTaskIndex < activeCircuit.tasks.length - 1 ? '1' : '0.5';
            };

            const toggleBigMode = () => {
                isBigMode = !isBigMode;
                document.body.classList.toggle('big-timer-mode', isBigMode);
            };

            const exitBigMode = () => {
                isBigMode = false;
                document.body.classList.remove('big-timer-mode');
            };

            const completeCircuit = () => {
                pauseTimer();
                alert('Circuit Complete! 🎉');
                updateControls();
                exitBigMode();
                // Reset background color
                document.body.style.backgroundColor = 'var(--dark-bg)';
                setTimeout(() => navigateTo('home'), 2000);
            };

            const formatTime = (s) => `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;

            // --- SETTINGS FUNCTIONS ---
            const toggleFlash = () => {
                settings.flashEnabled = !settings.flashEnabled;
                saveSettings();
                applySettings();
            };

            const toggleBeep = () => {
                settings.beepEnabled = !settings.beepEnabled;
                saveSettings();
                applySettings();
            };

            const selectColor = (element) => {
                const color = element.dataset.color;
                const type = element.dataset.type;

                // Update settings
                if (type === 'exercise') {
                    settings.exerciseColor = color;
                } else {
                    settings.breakColor = color;
                }

                saveSettings();
                applySettings();
            };

            const resetSettings = () => {
                if (confirm('Reset all settings to defaults?')) {
                    settings = {
                        flashEnabled: false,
                        exerciseColor: '#00f3ff',
                        breakColor: '#ff6600',
                        beepEnabled: false,
                        beepSeconds: 5
                    };
                    saveSettings();
                    applySettings();
                }
            };

            // Initialize Pickers
            setupPicker(els.pickerM, 60);
            setupPicker(els.pickerS, 60);
            
            // Setup beep seconds picker
            const setupBeepPicker = () => {
                const beepPicker = document.getElementById('beep-picker');
                if (!beepPicker) return;
                
                const updateActive = () => {
                    const scrollTop = beepPicker.scrollTop;
                    const items = beepPicker.querySelectorAll('.picker-item');
                    
                    items.forEach((item, idx) => {
                        // Account for first spacer (50px) + item index
                        const itemPosition = 50 + (idx * 50);
                        const offset = Math.abs(scrollTop - itemPosition);
                        
                        if (offset < 25) {
                            item.classList.add('active');
                            const value = parseInt(item.dataset.value);
                            if (!isNaN(value) && settings.beepSeconds !== value) {
                                settings.beepSeconds = value;
                                saveSettings();
                            }
                        } else {
                            item.classList.remove('active');
                        }
                    });
                };
                
                beepPicker.addEventListener('scroll', updateActive);
                
                // Initial scroll to selected value
                const items = beepPicker.querySelectorAll('.picker-item');
                items.forEach((item, idx) => {
                    if (parseInt(item.dataset.value) === settings.beepSeconds) {
                        beepPicker.scrollTop = 50 + (idx * 50); // spacer + item position
                    }
                });
                
                updateActive();
            };

            // Initialize beep picker after a short delay to ensure DOM is ready
            setTimeout(setupBeepPicker, 100);

            initDB();
            loadSettings();

            return {
                navigateTo,
                createCircuit: () => { activeCircuit = { id: Date.now().toString(), name: '', tasks: [] }; renderEditor(); navigateTo('editor'); },
                editCircuit: (id) => { activeCircuit = JSON.parse(JSON.stringify(circuits.find(c => c.id === id))); renderEditor(); navigateTo('editor'); },
                deleteCircuit: (id) => { if (confirm('Delete?')) deleteFromDB(id); },
                saveCircuit: () => { activeCircuit.name = els.circuitNameInput.value || 'New Circuit'; saveToDB(activeCircuit); navigateTo('home'); },
                moveTask: (i, d) => { if (i + d < 0 || i + d >= activeCircuit.tasks.length) return;[activeCircuit.tasks[i], activeCircuit.tasks[i + d]] = [activeCircuit.tasks[i + d], activeCircuit.tasks[i]]; renderEditor(); },
                removeTask: (i) => { activeCircuit.tasks.splice(i, 1); renderEditor(); },
                openTaskModal: (type) => {
                    app.mType = type;
                    els.modalName.value = type === 'workout' ? 'Pushups' : 'Rest';
                    setPickerValue(els.pickerM, 0); setPickerValue(els.pickerS, 30);
                    els.modal.classList.remove('opacity-0', 'pointer-events-none');
                    els.modal.firstElementChild.classList.remove('translate-y-full');
                },
                closeTaskModal: () => { els.modal.classList.add('opacity-0', 'pointer-events-none'); els.modal.firstElementChild.classList.add('translate-y-full'); },
                confirmTask: () => {
                    const d = (getPickerValue(els.pickerM) * 60) + getPickerValue(els.pickerS);
                    if (d > 0) activeCircuit.tasks.push({ name: els.modalName.value, duration: d, type: app.mType });
                    renderEditor(); app.closeTaskModal();
                },
                toggleTimer: () => isTimerRunning ? pauseTimer() : startTimer(),
                stopTimer: () => { 
                    pauseTimer(); 
                    setupTimer(); 
                    document.body.style.backgroundColor = 'var(--dark-bg)';
                    navigateTo('home'); 
                },
                skipTask: () => {
                    activeTaskIndex++;
                    loadTask(activeTaskIndex);
                    if (isTimerRunning) endTime = Date.now() + (timeLeftWhenPaused * 1000);
                },
                prevTask: () => {
                    if (activeTaskIndex > 0) {
                        activeTaskIndex--;
                        loadTask(activeTaskIndex);
                        if (isTimerRunning) endTime = Date.now() + (timeLeftWhenPaused * 1000);
                    } else {
                        loadTask(activeTaskIndex);
                        if (isTimerRunning) endTime = Date.now() + (timeLeftWhenPaused * 1000);
                    }
                },
                toggleLoop: () => { isLooping = !isLooping; updateControls(); },
                toggleBigMode,
                runCircuit,

                // Settings
                toggleFlash,
                toggleBeep,
                selectColor,
                resetSettings,

                // QR LOGIC
                shareCircuit: (id) => {
                    const c = circuits.find(circuit => String(circuit.id) === String(id));
                    if (!c) {
                        alert("Circuit not found!");
                        return;
                    }

                    const payload = {
                        v: 1,
                        n: c.name,
                        t: c.tasks.map(t => ({
                            n: t.name,
                            d: t.duration,
                            ty: t.type
                        }))
                    };

                    const data = JSON.stringify(payload);
                    els.qrTitle.innerText = c.name;

                    const encoded = btoa(encodeURIComponent(data));
                    lastShareUrl = `${window.location.origin}${window.location.pathname}?import=${encoded}`;

                    if (navigator.share) {
                        navigator.share({
                            title: `Aether Circuit: ${c.name}`,
                            text: `Try my "${c.name}" circuit on Aether Timer`,
                            url: lastShareUrl
                        }).catch(err => {
                            console.log("Share failed or cancelled", err);
                            app.showQR(data);
                        });
                    } else {
                        app.showQR(data);
                    }
                },
                showQR: (data) => {
                    const qrLib = window.QRCode;
                    if (!qrLib) {
                        alert("QR Library not loaded! Please check your internet connection.");
                        return;
                    }

                    els.qrCode.innerHTML = '';

                    try {
                        new qrLib(els.qrCode, {
                            text: data,
                            width: 256,
                            height: 256,
                            colorDark: "#0a0b1e",
                            colorLight: "#ffffff",
                            correctLevel: qrLib.CorrectLevel.M
                        });
                        els.qrModal.classList.remove('opacity-0', 'pointer-events-none');
                    } catch (e) {
                        alert("Failed to generate QR: " + e.message);
                    }
                },
                shareLinkOnly: () => {
                    if (navigator.share) {
                        navigator.share({
                            url: lastShareUrl
                        }).catch(() => { });
                    } else {
                        navigator.clipboard.writeText(lastShareUrl);
                        alert("Share link copied to clipboard!");
                    }
                },
                closeQRModal: () => {
                    els.qrModal.classList.add('opacity-0', 'pointer-events-none');
                },
                openScanner: async () => {
                    els.scannerModal.classList.remove('opacity-0', 'pointer-events-none');
                    html5QrCode = new Html5Qrcode("reader");
                    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

                    try {
                        await html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                            app.importCircuitData(decodedText);
                            app.closeScanner();
                        });
                    } catch (err) {
                        alert("Camera error: " + err);
                        app.closeScanner();
                    }
                },
                closeScanner: async () => {
                    if (html5QrCode) {
                        try { await html5QrCode.stop(); } catch (e) { }
                        html5QrCode = null;
                    }
                    els.scannerModal.classList.add('opacity-0', 'pointer-events-none');
                },
                importCircuitData: (data) => {
                    try {
                        const obj = JSON.parse(data);
                        if (obj.v !== 1 || !obj.n || !Array.isArray(obj.t)) throw new Error("Invalid format");

                        const newCircuit = {
                            id: Date.now().toString(),
                            name: obj.n,
                            tasks: obj.t.map(t => ({
                                name: t.n,
                                duration: Math.min(Math.max(t.d, 1), 7200),
                                type: (t.ty === 'workout' || t.ty === 'break') ? t.ty : 'workout'
                            }))
                        };

                        saveToDB(newCircuit);
                        alert(`Imported: ${newCircuit.name}`);
                    } catch (e) {
                        alert("Failed to parse QR data: " + e.message);
                    }
                }
            };
        })();

        // AUTO-IMPORT ON STARTUP
        (() => {
            const params = new URLSearchParams(window.location.search);
            const data = params.get("import");
            if (!data) return;

            setTimeout(() => {
                try {
                    const json = decodeURIComponent(atob(data));
                    app.importCircuitData(json);
                    history.replaceState({}, document.title, window.location.pathname);
                } catch (e) {
                    console.error("Link import failed", e);
                    alert("Invalid share link or data corrupted");
                }
            }, 500);
        })();

        // SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW registered!', reg);
                }).catch(err => {
                    console.log('SW registration failed!', err);
                });
            });
        }
    </script>
</body>

</html>
